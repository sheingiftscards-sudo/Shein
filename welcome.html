<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congratulations Daniya!</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card" style="text-align: center;">
            <div style="font-size: 50px; margin-bottom: 10px;">🎉</div>
            <h2 style="color: #4f46e5;">Congratulations, Daniya!</h2>
            <p class="subtitle">Your registration was successful.</p>
            
            <div class="user-info" style="background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; padding: 20px; border-radius: 12px; margin: 20px 0;">
                <p style="font-weight: 600; font-size: 16px;">🎁 $64 Giftcard Status:</p>
                <p style="font-size: 14px; margin-top: 5px;">Processing... We will send the claim code to <strong>daniyanadeem0@gmail.com</strong> within 24 hours.</p>
            </div>

            <p style="font-size: 12px; color: #666; margin-bottom: 20px;">Keep an eye on your inbox (and spam folder) for the gift!</p>
            
            <button onclick="window.location.href='login.html'" class="login-btn">Back to Login</button>
        </div>
    </div>

    <script>
        // Trigger confetti as soon as the page loads
        window.onload = function() {
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();

              if (timeLeft <= 0) {
                return clearInterval(interval);
              }

              var particleCount = 50 * (timeLeft / duration);
              // since particles fall down, start a bit higher than random
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        };
    </script>
</body>
</html>
